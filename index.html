<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d47;
    --accent: #00d4aa;
    --accent2: #3b82f6;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text: #f0f4ff;
    --muted: #6b7a99;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── BACKGROUND GRID ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,15,30,0.9);
    backdrop-filter: blur(12px);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo span { color: var(--accent); }

  .header-stats {
    display: flex;
    gap: 32px;
  }

  .hstat {
    text-align: right;
  }

  .hstat-val {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .hstat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  /* ── MAIN LAYOUT ── */
  main {
    position: relative;
    z-index: 1;
    max-width: 1300px;
    margin: 0 auto;
    padding: 32px 24px;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    box-shadow: var(--card-shadow);
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--accent);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  /* ── FORM ── */
  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
  }

  .form-group select option {
    background: var(--surface2);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* ── BUTTONS ── */
  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 6px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0f1e;
  }

  .btn-primary:hover { background: #00bfa0; transform: translateY(-1px); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { border-color: var(--accent2); }

  .btn-danger {
    background: rgba(239,68,68,0.15);
    color: var(--danger);
    border: 1px solid rgba(239,68,68,0.3);
  }

  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  .btn-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── SEARCH BAR ── */
  .search-bar {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px 10px 38px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
  }

  .search-bar select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  .btn-clear {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--danger);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-clear:hover { background: rgba(239,68,68,0.25); }

  /* ── TABLE ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    background: var(--surface2);
    padding: 12px 16px;
    text-align: left;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    transition: color 0.2s;
    border-bottom: 1px solid var(--border);
  }

  thead th:hover { color: var(--accent); }

  thead th.sort-asc::after  { content: ' ↑'; color: var(--accent); }
  thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }

  tbody tr:hover    { background: var(--surface2); }
  tbody tr.selected { background: rgba(0,212,170,0.08); border-color: rgba(0,212,170,0.2); }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 13px 16px;
    color: var(--text);
    vertical-align: middle;
  }

  .amount-cell {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    color: var(--accent);
  }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    background: rgba(59,130,246,0.15);
    color: #93c5fd;
    border: 1px solid rgba(59,130,246,0.2);
  }

  /* Category colors */
  .badge-electronics { background: rgba(168,85,247,0.15); color: #c084fc; border-color: rgba(168,85,247,0.2); }
  .badge-clothing    { background: rgba(236,72,153,0.15); color: #f9a8d4; border-color: rgba(236,72,153,0.2); }
  .badge-food        { background: rgba(245,158,11,0.15); color: #fcd34d; border-color: rgba(245,158,11,0.2); }
  .badge-software    { background: rgba(59,130,246,0.15); color: #93c5fd; border-color: rgba(59,130,246,0.2); }
  .badge-services    { background: rgba(20,184,166,0.15); color: #5eead4; border-color: rgba(20,184,166,0.2); }
  .badge-hardware    { background: rgba(239,68,68,0.15);  color: #fca5a5; border-color: rgba(239,68,68,0.2); }
  .badge-other       { background: rgba(107,114,128,0.15);color: #9ca3af; border-color: rgba(107,114,128,0.2); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 14px; }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .status-bar span { color: var(--accent); font-weight: 600; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { transform: scale(0.95); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .modal h3 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    margin-bottom: 10px;
  }

  .modal p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 20px;
  }

  .modal-btns {
    display: flex;
    gap: 10px;
  }

  .modal-btns button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .modal-btns .btn-confirm {
    background: var(--danger);
    color: white;
  }

  .modal-btns .btn-cancel {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--accent);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 200;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* ── TOTAL HIGHLIGHT ── */
  .total-box {
    background: rgba(0,212,170,0.08);
    border: 1px solid rgba(0,212,170,0.2);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .total-box .total-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .total-box .total-val {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--accent);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  tbody tr { animation: fadeIn 0.2s ease; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    main {
      grid-template-columns: 1fr;
    }
    header { padding: 16px 20px; }
    .header-stats { gap: 20px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Smart<span>Sales</span></div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val" id="hTotalSales">0</div>
      <div class="hstat-label">Total Sales</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="hTotalAmount">0.00</div>
      <div class="hstat-label">Total Amount</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="hAvgAmount">0.00</div>
      <div class="hstat-label">Avg Sale</div>
    </div>
  </div>
</header>

<main>

  <!-- LEFT: FORM -->
  <div class="card">
    <div class="card-title" id="formTitle">Add New Sale</div>

    <div class="form-group">
      <label>Product Name</label>
      <input type="text" id="productField" placeholder="e.g. Laptop, T-Shirt..."/>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="amountField" placeholder="e.g. 1500" min="0"/>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="dateField"/>
      </div>
    </div>

    <div class="form-group">
      <label>Customer Name</label>
      <input type="text" id="customerField" placeholder="e.g. Rahul Sharma"/>
    </div>

    <div class="form-group">
      <label>Category</label>
      <select id="categoryField">
        <option>Electronics</option>
        <option>Clothing</option>
        <option>Food & Beverage</option>
        <option>Software</option>
        <option>Services</option>
        <option>Hardware</option>
        <option>Other</option>
      </select>
    </div>

    <button class="btn btn-primary" id="addBtn" onclick="addOrUpdateSale()">
      + Add Sale
    </button>

    <div class="btn-group">
      <button class="btn btn-secondary" onclick="cancelEdit()">Cancel / Clear</button>
      <button class="btn btn-danger"    onclick="confirmDelete()">Delete Selected</button>
    </div>

    <!-- TOTAL BOX -->
    <div class="total-box" style="margin-top:20px">
      <div>
        <div class="total-label">Visible Total</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px" id="visibleCount">0 sales</div>
      </div>
      <div class="total-val" id="visibleTotal">₹0.00</div>
    </div>
  </div>

  <!-- RIGHT: TABLE -->
  <div class="right-panel">

    <!-- Search Bar -->
    <div class="card" style="padding:16px">
      <div class="search-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchField" placeholder="Search sales..."
                 oninput="applyFilter()"/>
        </div>
        <select id="filterCol" onchange="applyFilter()">
          <option value="-1">All Columns</option>
          <option value="0">Product</option>
          <option value="1">Amount</option>
          <option value="2">Date</option>
          <option value="3">Category</option>
          <option value="4">Customer</option>
        </select>
        <button class="btn-clear" onclick="clearSearch()">✕ Clear</button>
      </div>
    </div>

    <!-- Table -->
    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table id="salesTable">
          <thead>
            <tr>
              <th onclick="sortTable(0)" id="th0">Product</th>
              <th onclick="sortTable(1)" id="th1">Amount</th>
              <th onclick="sortTable(2)" id="th2">Date</th>
              <th onclick="sortTable(3)" id="th3">Category</th>
              <th onclick="sortTable(4)" id="th4">Customer</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📊</div>
        <p>No sales yet. Add your first sale!</p>
      </div>

      <!-- Status bar -->
      <div class="status-bar" id="statusBar">
        <div>Showing <span id="statusCount">0</span> of <span id="statusTotal">0</span> sales</div>
        <div id="statusMsg">Ready</div>
      </div>
    </div>

  </div>
</main>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>Delete Sale?</h3>
    <p id="deleteModalMsg">Are you sure you want to delete this sale?</p>
    <div class="modal-btns">
      <button class="btn-confirm" onclick="doDelete()">Yes, Delete</button>
      <button class="btn-cancel"  onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  DATA
// ============================================================
let salesList    = [];
let editIndex    = -1;   // -1 = adding new, 0+ = editing existing
let sortCol      = 2;    // default sort: Date
let sortDir      = -1;   // -1 = desc, 1 = asc
let filteredList = [];   // what's currently shown in table

// Load from localStorage on startup
function loadData() {
  try {
    const raw = localStorage.getItem('smartSalesData');
    if (raw) salesList = JSON.parse(raw);
  } catch(e) {
    salesList = [];
  }
}

// Save to localStorage
function saveData() {
  localStorage.setItem('smartSalesData', JSON.stringify(salesList));
}

// ============================================================
//  ADD / UPDATE
// ============================================================
function addOrUpdateSale() {
  const product  = document.getElementById('productField').value.trim();
  const amtRaw   = document.getElementById('amountField').value.trim();
  const date     = document.getElementById('dateField').value;
  const customer = document.getElementById('customerField').value.trim();
  const category = document.getElementById('categoryField').value;

  // Validation
  if (!product)  { showToast('Product name is required!', true); return; }
  if (!amtRaw)   { showToast('Amount is required!', true); return; }
  if (!date)     { showToast('Date is required!', true); return; }

  const amount = parseFloat(amtRaw);
  if (isNaN(amount) || amount < 0) {
    showToast('Amount must be a positive number!', true);
    return;
  }

  const sale = { product, amount, date, category, customer };

  if (editIndex === -1) {
    salesList.push(sale);
    showToast('Sale added: ' + product);
  } else {
    salesList[editIndex] = sale;
    showToast('Sale updated: ' + product);
    editIndex = -1;
    document.getElementById('formTitle').textContent = 'Add New Sale';
    document.getElementById('addBtn').textContent    = '+ Add Sale';
  }

  saveData();
  clearFields();
  renderTable();
  updateHeader();
}

// ============================================================
//  EDIT — called when row is clicked
// ============================================================
function selectRow(index) {
  // index is the index in filteredList
  const realIndex = salesList.indexOf(filteredList[index]);
  if (realIndex === -1) return;

  editIndex = realIndex;
  const s   = salesList[realIndex];

  document.getElementById('productField').value  = s.product;
  document.getElementById('amountField').value   = s.amount;
  document.getElementById('dateField').value     = s.date;
  document.getElementById('customerField').value = s.customer;
  document.getElementById('categoryField').value = s.category;

  document.getElementById('formTitle').textContent = 'Edit Sale';
  document.getElementById('addBtn').textContent    = 'Save Changes';

  // Highlight selected row
  document.querySelectorAll('#tableBody tr').forEach((r,i) => {
    r.classList.toggle('selected', i === index);
  });
}

// ============================================================
//  CANCEL / CLEAR
// ============================================================
function cancelEdit() {
  editIndex = -1;
  clearFields();
  document.getElementById('formTitle').textContent = 'Add New Sale';
  document.getElementById('addBtn').textContent    = '+ Add Sale';
  document.querySelectorAll('#tableBody tr').forEach(r => r.classList.remove('selected'));
}

function clearFields() {
  document.getElementById('productField').value  = '';
  document.getElementById('amountField').value   = '';
  document.getElementById('dateField').value     = '';
  document.getElementById('customerField').value = '';
  document.getElementById('categoryField').selectedIndex = 0;
}

// ============================================================
//  DELETE
// ============================================================
function confirmDelete() {
  if (editIndex === -1) {
    showToast('Select a row first!', true);
    return;
  }
  const name = salesList[editIndex].product;
  document.getElementById('deleteModalMsg').textContent =
    'Delete "' + name + '"? This cannot be undone.';
  document.getElementById('deleteModal').classList.add('show');
}

function doDelete() {
  const name = salesList[editIndex].product;
  salesList.splice(editIndex, 1);
  saveData();
  editIndex = -1;
  closeModal();
  cancelEdit();
  renderTable();
  updateHeader();
  showToast('Deleted: ' + name);
}

function closeModal() {
  document.getElementById('deleteModal').classList.remove('show');
}

// ============================================================
//  FILTER
// ============================================================
function applyFilter() {
  const text   = document.getElementById('searchField').value.trim().toLowerCase();
  const colIdx = parseInt(document.getElementById('filterCol').value);

  if (!text) {
    filteredList = [...salesList];
  } else {
    filteredList = salesList.filter(s => {
      const vals = [s.product, s.amount, s.date, s.category, s.customer];
      if (colIdx === -1) {
        return vals.some(v => String(v).toLowerCase().includes(text));
      } else {
        return String(vals[colIdx]).toLowerCase().includes(text);
      }
    });
  }

  sortFiltered();
  renderRows();
  updateTotals();
}

function clearSearch() {
  document.getElementById('searchField').value = '';
  applyFilter();
}

// ============================================================
//  SORT
// ============================================================
function sortTable(col) {
  if (sortCol === col) {
    sortDir *= -1; // toggle direction
  } else {
    sortCol = col;
    sortDir = 1;
  }

  // Update header indicators
  for (let i = 0; i < 5; i++) {
    const th = document.getElementById('th' + i);
    th.classList.remove('sort-asc', 'sort-desc');
  }
  const active = document.getElementById('th' + col);
  active.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');

  sortFiltered();
  renderRows();
}

function sortFiltered() {
  filteredList.sort((a, b) => {
    const vals = [
      [a.product,  b.product],
      [a.amount,   b.amount],
      [a.date,     b.date],
      [a.category, b.category],
      [a.customer, b.customer]
    ];
    let [av, bv] = vals[sortCol];

    if (sortCol === 1) {
      // Numeric sort for Amount
      return (av - bv) * sortDir;
    } else if (sortCol === 2) {
      // Date sort
      return (new Date(av) - new Date(bv)) * sortDir;
    } else {
      return String(av).localeCompare(String(bv)) * sortDir;
    }
  });
}

// ============================================================
//  RENDER
// ============================================================
function renderTable() {
  applyFilter(); // this calls renderRows + updateTotals internally
}

function renderRows() {
  const tbody      = document.getElementById('tableBody');
  const emptyState = document.getElementById('emptyState');

  tbody.innerHTML = '';

  if (filteredList.length === 0) {
    emptyState.style.display = 'block';
    tbody.style.display      = 'none';
  } else {
    emptyState.style.display = 'none';
    tbody.style.display      = '';

    filteredList.forEach((s, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escHtml(s.product)}</td>
        <td class="amount-cell">₹${parseFloat(s.amount).toFixed(2)}</td>
        <td>${formatDate(s.date)}</td>
        <td><span class="badge ${badgeClass(s.category)}">${escHtml(s.category)}</span></td>
        <td>${escHtml(s.customer || '—')}</td>
      `;
      tr.onclick = () => selectRow(i);
      tbody.appendChild(tr);
    });
  }

  // Status bar
  document.getElementById('statusCount').textContent = filteredList.length;
  document.getElementById('statusTotal').textContent = salesList.length;
  document.getElementById('statusMsg').textContent   =
    editIndex === -1 ? 'Ready' : 'Editing sale...';
}

function updateTotals() {
  const visTotal = filteredList.reduce((sum, s) => sum + parseFloat(s.amount), 0);
  document.getElementById('visibleTotal').textContent = '₹' + visTotal.toFixed(2);
  document.getElementById('visibleCount').textContent = filteredList.length + ' sale(s)';
}

function updateHeader() {
  const total  = salesList.length;
  const amount = salesList.reduce((s, x) => s + parseFloat(x.amount), 0);
  const avg    = total > 0 ? amount / total : 0;
  document.getElementById('hTotalSales').textContent  = total;
  document.getElementById('hTotalAmount').textContent = '₹' + amount.toFixed(2);
  document.getElementById('hAvgAmount').textContent   = '₹' + avg.toFixed(2);
}

// ============================================================
//  HELPERS
// ============================================================
function formatDate(dateStr) {
  if (!dateStr) return '—';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  } catch(e) { return dateStr; }
}

function badgeClass(cat) {
  const map = {
    'Electronics':'badge-electronics',
    'Clothing':'badge-clothing',
    'Food & Beverage':'badge-food',
    'Software':'badge-software',
    'Services':'badge-services',
    'Hardware':'badge-hardware',
    'Other':'badge-other'
  };
  return map[cat] || 'badge-other';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent    = msg;
  t.style.color    = isError ? 'var(--danger)' : 'var(--accent)';
  t.style.borderColor = isError ? 'var(--danger)' : 'var(--accent)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Close modal on overlay click
document.getElementById('deleteModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============================================================
//  INIT
// ============================================================
loadData();
// Set default sort header indicator
document.getElementById('th2').classList.add('sort-desc');
renderTable();
updateHeader();

// Set today's date as default
document.getElementById('dateField').valueAsDate = new Date();
</script>
